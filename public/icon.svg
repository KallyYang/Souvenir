  <polygon points="256,160 275,185 237,185" fill="#fef3c7"/>
  <!-- Ground -->
  <rect x="96" y="280" width="320" height="60" rx="0" fill="#a16207"/>
  <!-- Bottom rounded corners fix -->
  <rect x="96" y="300" width="320" height="40" rx="0" fill="#a16207"/>
  <rect x="96" y="316" width="320" height="24" rx="0" fill="#a16207"/>
  <path d="M96 316 h320 v16 q0 8 -12 8 H108 q-12 0 -12 -8 z" fill="#a16207"/>
  <!-- Letter S -->
  <text x="256" y="430" font-family="Georgia, serif" font-size="72" font-weight="bold" text-anchor="middle" fill="#fef3c7" opacity="0.9">S</text>
