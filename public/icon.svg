  <!-- Film strip right -->
  <rect x="436" y="48" width="28" height="416" rx="8" fill="#fef3c7"/>
  <!-- Film holes left -->
  <rect x="56" y="80" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="56" y="130" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="56" y="180" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="56" y="230" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="56" y="280" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="56" y="330" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="56" y="380" width="12" height="20" rx="3" fill="#78350f"/>
  <!-- Film holes right -->
  <rect x="444" y="80" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="444" y="130" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="444" y="180" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="444" y="230" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="444" y="280" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="444" y="330" width="12" height="20" rx="3" fill="#78350f"/>
  <rect x="444" y="380" width="12" height="20" rx="3" fill="#78350f"/>
  <!-- Photo frame -->
  <rect x="96" y="120" width="320" height="220" rx="12" fill="#fef3c7"/>
  <!-- Mountain scene -->
  <rect x="96" y="120" width="320" height="220" rx="12" fill="#bfdbfe"/>
  <!-- Sky gradient simulation -->
  <rect x="96" y="120" width="320" height="130" rx="12" fill="#7dd3fc"/>
  <!-- Mountains -->
  <polygon points="256,160 340,280 172,280" fill="#d97706"/>
  <polygon points="180,200 260,280 100,280" fill="#b45309"/>
  <polygon points="330,190 400,280 260,280" fill="#92400e"/>
